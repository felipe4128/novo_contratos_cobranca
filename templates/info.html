<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Info do Contrato</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h3>Info: Contrato {{ c.numero }}</h3>
  <form method="post" class="row g-3">
    <div class="col-md-3">
      <label class="form-label">CPF</label>
      <input name="cpf" value="{{ c.cpf or '' }}" class="form-control">
    </div>
    <div class="col-md-6">
      <label class="form-label">Cliente</label>
      <input name="cliente" value="{{ c.cliente or '' }}" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Número</label>
      <input name="numero" value="{{ c.numero or '' }}" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Tipo</label>
      <input name="tipo_contrato" value="{{ c.tipo_contrato or '' }}" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Valor</label>
      <input name="valor" value="{{ c.valor or '' }}" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Valor Pago</label>
      <input name="valor_pago" value="{{ c.valor_pago or '' }}" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Parcelas</label>
      <input name="parcelas" value="{{ c.parcelas or 0 }}" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Parcelas Restantes</label>
      <input name="parcelas_restantes" value="{{ c.parcelas_restantes or 0 }}" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Valor da Parcela</label>
      <input name="valor_das_parcelas" value="{{ c.valor_das_parcelas or '' }}" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">1º Venc. Parcela</label>
      <input name="vencimento_parcelas" value="{{ to_br_date(c.vencimento_parcelas) }}" class="form-control" placeholder="dd/mm/aaaa">
    </div>

    <div class="col-12">
      <button class="btn btn-success">Salvar</button>
      <a href="{{ url_for('index') }}" class="btn btn-secondary">Voltar</a>
    </div>
  </form>
</div>
</body>
</html>
