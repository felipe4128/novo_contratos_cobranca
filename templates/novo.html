
<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Novo Contrato</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-3">
  <h3>Novo Contrato</h3>
  <form method="post" class="row g-2">
    <div class="col-md-3">
      <label class="form-label">CPF</label>
      <input name="cpf" class="form-control">
    </div>
    <div class="col-md-6">
      <label class="form-label">Cliente</label>
      <input name="cliente" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Contrato</label>
      <input name="numero" class="form-control">
    </div>

    <div class="col-md-2">
      <label class="form-label">Tipo</label>
      <input name="tipo_contrato" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Cooperado</label>
      <input name="cooperado" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Garantia</label>
      <input name="garantia" class="form-control">
    </div>
    <div class="col-md-2">
      <label class="form-label">Valor</label>
      <input name="valor" class="form-control">
    </div>
    <div class="col-md-2">
      <label class="form-label">Valor no Sistema</label>
      <input name="valor_contrato_sistema" class="form-control">
    </div>

    <div class="col-md-2">
      <label class="form-label">Valor Parcela</label>
      <input name="valor_das_parcelas" class="form-control">
    </div>
    <div class="col-md-2">
      <label class="form-label">Parcelas</label>
      <input name="parcelas" class="form-control">
    </div>
    <div class="col-md-2">
      <label class="form-label">1º Venc. Parcela</label>
      <input name="vencimento_parcelas" placeholder="dd/mm/aaaa" class="form-control">
    </div>

    <div class="col-12 mt-3">
      <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Voltar</a>
      <button class="btn btn-success">Salvar</button>
    </div>
  </form>
</div>
</body>
</html>
