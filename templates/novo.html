<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Novo Contrato</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h3>Novo Contrato</h3>
  <form method="post" class="row g-3">
    <div class="col-md-3">
      <label class="form-label">CPF</label>
      <input name="cpf" class="form-control">
    </div>
    <div class="col-md-6">
      <label class="form-label">Cliente</label>
      <input name="cliente" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Número</label>
      <input name="numero" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Tipo</label>
      <input name="tipo_contrato" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Cooperado</label>
      <input name="cooperado" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Garantia</label>
      <input name="garantia" class="form-control">
    </div>
    <div class="col-md-3">
      <label class="form-label">Valor</label>
      <input name="valor" class="form-control">
    </div>

    <hr class="mt-3"/>

    <div class="col-md-3">
      <label class="form-label">Valor da Parcela</label>
      <input name="valor_das_parcelas" class="form-control" value="0,00">
    </div>
    <div class="col-md-3">
      <label class="form-label">Parcelas</label>
      <input name="parcelas" class="form-control" value="0">
    </div>
    <div class="col-md-3">
      <label class="form-label">1º Venc. Parcela</label>
      <input name="vencimento_parcelas" class="form-control" placeholder="dd/mm/aaaa">
    </div>

    <div class="col-12">
      <button class="btn btn-success">Salvar</button>
      <a href="{{ url_for('index') }}" class="btn btn-secondary">Voltar</a>
    </div>
  </form>
</div>
</body>
</html>
