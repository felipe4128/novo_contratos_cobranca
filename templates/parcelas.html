
<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Parcelas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-3">
  <h3>Parcelas - Contrato {{ c.numero }}</h3>
  <table class="table table-sm table-hover align-middle">
    <thead class="table-dark">
      <tr><th>#</th><th>Vencimento</th><th>Valor</th><th>Baixa</th></tr>
    </thead>
    <tbody>
    {% for p in parcelas %}
      <tr>
        <td>{{ p.numero }}</td>
        <td>{{ p.vencimento|br_date }}</td>
        <td>{{ "%.2f"|format(p.valor or 0) }}</td>
        <td>
          {% if p.baixada_em %}
            Baixada em {{ p.baixada_em|br_date }}
          {% else %}
            <form method="post" action="{{ url_for('baixar', pid=p.id) }}">
              <button class="btn btn-primary btn-sm">Dar Baixa</button>
            </form>
          {% endif %}
        </td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
  <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Voltar</a>
</div>
</body>
</html>
